<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../assets/styles/island.css">
</head>
<body>
    <div class="main">
        <div class="music" id="page-ui-2">
            <div class="artist-image">
                <img src="" width="64" height="64" id="song-image" class="song-image" draggable="false">
                <div class="title-artist">
                    <p id="song-title"></p>
                    <p id="song-artist"></p>
                </div>
            </div>
            <div class="controls">
                <button class="control-button" id="prev-button">
                    <img src="../../assets/icons/skip_previous.svg" width="26" height="26">
                </button>
                <button class="control-button" id="play-button">
                    <img id="play-icon" src="../../assets/icons/play.svg" width="26" height="26">
                </button>
                <button class="control-button" id="next-button">
                    <img src="../../assets/icons/skip_next.svg" width="26" height="26">
                </button>
            </div>
            <div class="totalProgressBar">
                <p id="song-time">00:00</p>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <p id="song-duration">00:00</p>
            </div>
        </div>

        <div class="home" id="page-ui-1">
            <div class="home-top">
                <p class="current-time" id="current-time">00:00</p>
                <p class="song-small" id="song-small"></p>
            </div>
            <div class="apps">
                <div class="default-apps app-group">
                    <div class="app" id="app-1">
                        <img src="../../assets/icons/settings.svg" width="32" height="32">
                        <p>Settings</p>
                    </div>
                    <div class="app" id="app-2">
                        <img src="../../assets/icons/ai.svg" width="32" height="32">
                        <p>DynAI</p>
                    </div>
                </div>
                <div class="favorite-apps app-group">
                    <div class="add-favorite-app app">
                        <img src="../../assets/icons/add.svg" width="32" height="32">
                        <p>Add</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="pages">
            <div class="page active" id="page-1"></div>
            <div class="page" id="page-2"></div>
        </div>

        <div class="shortcuts">
            <div class="shortcut" id="expand-to-app" title="Expand">
                <img src="../../assets/icons/expand.svg" class="shortcut-icon">
            </div>
            <div class="shortcut" id="collapse-to-island" title="Collapse">
                <img src="../../assets/icons/collapse.svg" class="shortcut-icon">
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
